
services:
  postgres:
    image: postgres:15-alpine
    container_name: stockflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockflow123}
      POSTGRES_DB: ${POSTGRES_DB:-stockflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockflow} -d ${POSTGRES_DB:-stockflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stockflow-net

  backend:
    build: ./backend
    container_name: stockflow-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stockflow}:${POSTGRES_PASSWORD:-stockflow123}@postgres:5432/${POSTGRES_DB:-stockflow}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockflow-net

  frontend:
    build: ./frontend
    container_name: stockflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stockflow-net

volumes:
  pgdata:

networks:
  stockflow-net: